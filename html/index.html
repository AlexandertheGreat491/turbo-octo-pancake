<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
     <title>My Garden Planner</title>
        <style>
     :root { --soil: #5D4037; --highlight: #FFEB3B; --heading:#00cc66}
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; gap: 20px; padding: 20px; background: #e8f5e9; }
        /*Sidebar Styles*/
        #sidebar{width:250px; background: whie; padding:20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
        .plant-option {
            display:flex;align-items: center; gap:10px;
            padding: 10px; margin-bottom: 10px;border: 2px solid #eee;
            border-radius: 8px; cursor:grab; transition:0.3s;
        }
        .plant-option:hover {border-color: #4caf50;background: #f2f8e9;}
        /*Grid Styles*/
        #garden-grid{
            display:grid; grid-template-columns: repeat(6, 80px);
            grid-template-rows: repeat(5, 80px); gap: 4px;
            background: #3e2723; padding: 10px; border-radius: 8px;
        }
        .cell{
            width:80px; height: 80px;background: var(--soil);
            display:flex;align-items: center;justify-content:center;
            font-size:40px;border-radius:4px;cursor:pointer;
        }
        .cell:empty::before{content:'+';color:rgba(255,255,255,0.2);font-size: 20px;}
        #info-box{
            margin-top:20px;font-size: 0.9em;color: #555;line-height:1.4;} 
</style>
    </head>
     <body> 
        <div id="heading"><h1 style="color:#006600";font-size: 16px;
            font-family:'Verdana', sans-serif; text-shadow: 1px 1px 2px #00cc66;">
            Welcome to Alex's Garden</h1>
</h1>
        </div>  
        <div id="sidebar">      
    <h2 style="font-size:18px;font-family: 'Verdana', sans-serif;">Seed Box</h2>
    <div class="plant-option" draggable="true" data-type="rhubarb" data-icon="🌿">
        <span>🌿</span> <strong style="font-family: 'Verdana', sans-serif;">Rhubarb</strong>
    </div>
    <div class="plant-option" draggable="true" data-type="asparagus" data-icon="🎋">
        <span>🎋</span> <strong style="font-family: 'Verdana', sans-serif;">Asparagus</strong>
    </div>
    <div class="plant-option" draggable="true" data-type="broccoli" data-icon="🥦">
        <span>🥦</span> <strong style="font-family: 'Verdana', sans-serif;">Broccoli</strong>
    </div>
    <div class="plant-option" draggable="true" data-type="carrot" data-icon="🥕">
    <span>🥕</span> <strong style="font-family: 'Verdana', sans-serif;">Carrot</strong>
</div>
    
    <div id="info-box">
        <strong>Planting Tip:</strong><br>
        <span id="tip-text">Drag a plant onto the grid to see details.</span>
    </div>
</div>

<div id="garden-grid" id="grid"></div>
<script>
    const info = {
        rhubarb: "Rhubarb needs lots of space and stays in the ground for years. Keep away from paths!",
        asparagus: "Asparagus takes 2-3 years to establish. Plant in a dedicated permanent bed.",
        broccoli: "Broccoli likes cool weather and firm soil. Watch out for cabbage white butterflies!",
        carrot: "Carrots need loose, stone-free soil to grow straight. Don't over-fertilize with nitrogen!"
    };

    const grid = document.getElementById('garden-grid');
    const tipText = document.getElementById('tip-text');
    let activePlant = null;

    // Create 30 plots
    for (let i = 0; i < 30; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.ondragover = e => e.preventDefault();
        cell.ondrop = function(e) {
            const type = e.dataTransfer.getData("type");
            const icon = e.dataTransfer.getData("icon");
            this.innerText = icon;
            tipText.innerHTML = `<strong>${type.toUpperCase()}:</strong> ${info[type]}`;
        };
        cell.onclick = function() { this.innerText = ""; };
        grid.appendChild(cell);
    }

    document.querySelectorAll('.plant-option').forEach(item => {
        item.ondragstart = e => {
            e.dataTransfer.setData("type", item.dataset.type);
            e.dataTransfer.setData("icon", item.dataset.icon);
        };
    });
</script>
    </body>
    </html>
