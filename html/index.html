<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gourmet Garden Planner</title>
    <style>
        :root { --soil: #5D4037; --highlight: #FFEB3B; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; gap: 20px; padding: 20px; background: #e8f5e9; }
        /*Sidebar Styles*/
        #sidebar{width:250px; background: whie; padding:20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
        .plant-option {
            display:flex;align-items: center; gap:10px;
            padding: 10px; margin-bottom: 10px;border: 2px solid #eee;
            border-radius: 8px; cursor:grab; transition:0.3s;
        }
        .plant-option:hover {border-color: #4caf50;background: #f2f8e9;}
        /*Grid Styles*/
        #garden-grid{
            display:grid; grid-template-columns: repeat(6, 80px);
            grid-template-rows: repeat(5, 80px); gap: 4px;
            background: #3e2723; padding: 10px; border-radius: 8px;
        }
        .cell{
            width:80px; height: 80px;background: var(--soil);
            display:flex;align-items: center;justify-content:center;
            font-size:40px;border-radius:4px;cursor:pointer;
        }
        .cell:empty::before{content:'+';color:rgba(255,255,255,0.2);font-size: 20px;}
        #info-box{
            margin-top:20px;font-size: 0.9em;color: #555;line-height:1.4;}
    </style>
    </head>
     <body>
    </body>
    </html>
